<html lang="pt-PT">
<head>
<meta charset="UTF-8">

<title>CDP Fotos · Casa da Portela</title>
<meta name="description" content="Arrasta as fotografias e recebe-as leves e prontas para os portais. Tudo no navegador.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23005395'/><path d='M30 55 L50 72 L70 55 M50 70 L50 28' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#F3F4F2;
    --card:#FFFFFF;
    --ink:#1A2026;
    --muted:#69707A;
    --faint:#9AA1AB;
    --line:#E4E7E2;
    --blue:#005395;
    --blue-dark:#013E70;
    --blue-tint:#EAF2F9;
    --ok:#1E7F4F;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'Space Grotesk',system-ui,sans-serif;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 12px 32px -18px rgba(16,24,40,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom:120px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 20px}

  /* ---------- header ---------- */
  header{padding:40px 0 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .cp-logo{height:48px;width:auto;display:block;flex:0 0 auto}
  .head-sep{width:1px;height:40px;background:var(--line)}
  .head-txt h1{font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
  .head-txt h1 em{font-style:normal;color:var(--blue)}
  .head-txt p{font-size:14px;color:var(--muted);margin-top:1px}
  @media (max-width:520px){
    .cp-logo{height:40px}
    .head-sep{display:none}
  }

  /* ---------- dropzone ---------- */
  .drop{
    background:var(--card);
    border:1.5px dashed #C9CFCA;
    border-radius:20px;
    padding:72px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s, box-shadow .15s;
    box-shadow:var(--shadow);
  }
  .drop:hover{border-color:var(--blue)}
  .drop.over{border-color:var(--blue);background:var(--blue-tint)}
  .drop:focus-visible{outline:2px solid var(--blue);outline-offset:3px}
  .drop .arrow{
    width:60px;height:60px;border-radius:50%;
    background:var(--blue);color:#fff;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 18px;
    transition:transform .15s;
  }
  .drop:hover .arrow{transform:translateY(3px)}
  .drop .arrow svg{width:26px;height:26px}
  .drop h2{font-size:21px;font-weight:600;letter-spacing:-.01em}
  .drop p{color:var(--muted);font-size:15px;margin-top:6px}
  .drop input{display:none}

  /* ---------- formato (único controlo) ---------- */
  .fmt-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:22px 0 30px}
  .fmt-row .lbl{font-size:14px;color:var(--muted)}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
  .seg button{
    font-family:var(--sans);font-size:14px;font-weight:600;
    padding:8px 26px;border:none;border-radius:999px;
    background:transparent;color:var(--muted);cursor:pointer;
    transition:background .12s,color .12s;
  }
  .seg button.on{background:var(--blue);color:#fff}
  .seg button:focus-visible{outline:2px solid var(--blue-dark);outline-offset:2px}

  /* ---------- lista ---------- */
  .list{display:flex;flex-direction:column;gap:10px}
  .item{
    display:grid;grid-template-columns:68px 1fr auto;gap:16px;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:12px 16px;box-shadow:var(--shadow);
  }
  .item img.thumb,.item .thumb{
    width:68px;height:52px;object-fit:cover;border-radius:9px;background:#EDEFEA;
  }
  .item .name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.005em}
  .item .meta{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-top:3px}
  .item .meta b{color:var(--ink);font-weight:500}
  .item .right{display:flex;align-items:center;gap:14px}
  .item .save{
    font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ok);
    background:#E8F4EE;border-radius:999px;padding:4px 12px;white-space:nowrap;
  }
  .item .save.grew{color:#8A5A18;background:#F7EEDD}
  .item .status{font-family:var(--mono);font-size:12.5px;color:var(--faint)}
  .item a.dl{
    display:flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:10px;
    color:var(--blue);border:1px solid var(--line);text-decoration:none;
    transition:background .12s,border-color .12s;
  }
  .item a.dl:hover{background:var(--blue-tint);border-color:var(--blue)}
  .item a.dl svg{width:17px;height:17px}
  .item.err{border-color:#E4B4A6}
  .item.err .status{color:#B33A1B}
  @media (max-width:520px){
    .item{grid-template-columns:56px 1fr auto;gap:12px;padding:10px 12px}
    .item img.thumb,.item .thumb{width:56px;height:44px}
    .item .save{display:none}
  }

  /* ---------- barra fixa ---------- */
  .bar{
    position:fixed;left:0;right:0;bottom:0;z-index:10;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  }
  .bar-in{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .summary{flex:1;min-width:0}
  .summary .n{font-size:15px;font-weight:600}
  .summary .d{font-family:var(--mono);font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .summary .d b{color:var(--ok);font-weight:500}
  .btn{
    font-family:var(--sans);font-size:15px;font-weight:600;
    border:none;border-radius:12px;padding:13px 24px;cursor:pointer;
    transition:transform .08s, box-shadow .12s, background .12s;
    white-space:nowrap;
  }
  .btn:active{transform:scale(.98)}
  .btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .btn-zip{background:var(--blue);color:#fff;box-shadow:0 5px 16px rgba(0,83,149,.30)}
  .btn-zip:hover{background:var(--blue-dark)}
  .btn-zip:disabled{background:#C6CBD1;box-shadow:none;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:12px 18px}
  .btn-ghost:hover{color:var(--ink);border-color:var(--faint)}

  footer{margin-top:52px;padding:16px 0;color:var(--faint);font-size:12.5px;text-align:center}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v13M6 12l6 6 6-6"/></svg>
    </div>
    <h2>Arrasta as imagens para aqui</h2>
    <p>ou clica para selecionar</p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>
  </div>

  <div class="fmt-row">
    <span class="lbl">Exportar como</span>
    <div class="seg" role="group" aria-label="Formato de saída">
      <button id="fmtJpg" class="on" type="button">JPG</button>
      <button id="fmtPng" type="button">PNG</button>
    </div>
  </div>

  <div class="list" id="list" aria-live="polite"></div>

  <footer>Casa da Portela · as imagens são processadas no teu computador e nunca saem daqui.</footer>
</div>

<div class="bar">
  <div class="bar-in">
    <div class="summary">
      <div class="n" id="sTitle">Sem imagens</div>
      <div class="d" id="sDetail">Adiciona fotografias para começar</div>
    </div>
    <button class="btn btn-ghost" id="clearBtn" type="button">Limpar</button>
    <button class="btn btn-zip" id="zipBtn" type="button" disabled>Descarregar tudo</button>
  </div>
</div>

<script>
(() => {
"use strict";

/* ---------------- definições fixas (invisíveis ao utilizador) ---------------- */
const TARGET_H = 1080;   // altura de saída
const DPI = 72;          // resolução nos metadados
const JPG_Q = 0.8;       // qualidade JPG

let outFmt = "jpg";
let items = [];
let seq = 0;

const $ = id => document.getElementById(id);
const drop=$("drop"), fileInput=$("fileInput"), listEl=$("list");
const fmtJpg=$("fmtJpg"), fmtPng=$("fmtPng");
const zipBtn=$("zipBtn"), clearBtn=$("clearBtn");
const sTitle=$("sTitle"), sDetail=$("sDetail");

const fmtBytes = b => {
  if (b == null) return "—";
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b/1024).toFixed(0) + " KB";
  return (b/1048576).toFixed(2) + " MB";
};
const baseName = n => n.replace(/\.[^.]+$/, "");
const dlIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M4 20h16"/></svg>`;

/* ---------------- DPI: JPG (segmento JFIF APP0) ---------------- */
async function setJpegDpi(blob, dpi){
  const buf = new Uint8Array(await blob.arrayBuffer());
  if (buf[0]!==0xFF || buf[1]!==0xD8) return blob;
  if (buf[2]===0xFF && buf[3]===0xE0 &&
      buf[6]===0x4A && buf[7]===0x46 && buf[8]===0x49 && buf[9]===0x46 && buf[10]===0x00){
    buf[13]=1;
    buf[14]=(dpi>>8)&0xFF; buf[15]=dpi&0xFF;
    buf[16]=(dpi>>8)&0xFF; buf[17]=dpi&0xFF;
    return new Blob([buf], {type:"image/jpeg"});
  }
  const app0 = new Uint8Array([0xFF,0xE0,0x00,0x10,0x4A,0x46,0x49,0x46,0x00,0x01,0x01,0x01,
    (dpi>>8)&0xFF, dpi&0xFF, (dpi>>8)&0xFF, dpi&0xFF, 0x00,0x00]);
  const out = new Uint8Array(buf.length + app0.length);
  out.set(buf.subarray(0,2),0);
  out.set(app0,2);
  out.set(buf.subarray(2), 2+app0.length);
  return new Blob([out], {type:"image/jpeg"});
}

/* ---------------- DPI: PNG (chunk pHYs) ---------------- */
const crcTable = (() => {
  const t = new Uint32Array(256);
  for (let n=0;n<256;n++){
    let c=n;
    for (let k=0;k<8;k++) c = (c&1) ? 0xEDB88320 ^ (c>>>1) : c>>>1;
    t[n]=c;
  }
  return t;
})();
function crc32(bytes){
  let c = 0xFFFFFFFF;
  for (let i=0;i<bytes.length;i++) c = crcTable[(c ^ bytes[i]) & 0xFF] ^ (c>>>8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
async function setPngDpi(blob, dpi){
  const buf = new Uint8Array(await blob.arrayBuffer());
  const sig=[0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A];
  for (let i=0;i<8;i++) if (buf[i]!==sig[i]) return blob;
  const ppm = Math.round(dpi / 0.0254);
  const chunk = new Uint8Array(21);
  const dv = new DataView(chunk.buffer);
  dv.setUint32(0, 9);
  chunk.set([0x70,0x48,0x59,0x73], 4);
  dv.setUint32(8, ppm); dv.setUint32(12, ppm);
  chunk[16]=1;
  dv.setUint32(17, crc32(chunk.subarray(4,17)));
  const insertAt = 8 + 4 + 4 + 13 + 4;
  const out = new Uint8Array(buf.length + chunk.length);
  out.set(buf.subarray(0,insertAt),0);
  out.set(chunk, insertAt);
  out.set(buf.subarray(insertAt), insertAt+chunk.length);
  return new Blob([out], {type:"image/png"});
}

/* ---------------- redimensionar + converter ---------------- */
async function processFile(file){
  let bmp;
  try {
    bmp = await createImageBitmap(file, {imageOrientation:"from-image"});
  } catch(e){
    bmp = await createImageBitmap(file);
  }
  let {width:w, height:h} = bmp;
  let tw=w, th=h;
  if (h > TARGET_H){
    const s = TARGET_H / h;
    th = TARGET_H;
    tw = Math.max(1, Math.round(w * s));
  }
  const canvas = document.createElement("canvas");
  canvas.width = tw; canvas.height = th;
  const ctx = canvas.getContext("2d");
  if (outFmt === "jpg"){ ctx.fillStyle="#FFFFFF"; ctx.fillRect(0,0,tw,th); }
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  let src = bmp;
  while (src.height > th * 2){
    const hw = Math.round(src.width/2), hh = Math.round(src.height/2);
    const c = document.createElement("canvas");
    c.width=hw; c.height=hh;
    const cx = c.getContext("2d");
    cx.imageSmoothingEnabled=true; cx.imageSmoothingQuality="high";
    cx.drawImage(src,0,0,hw,hh);
    src = c;
  }
  ctx.drawImage(src, 0, 0, tw, th);
  bmp.close?.();

  const mime = outFmt === "jpg" ? "image/jpeg" : "image/png";
  let blob = await new Promise(res => canvas.toBlob(res, mime, outFmt==="jpg" ? JPG_Q : undefined));
  if (!blob) throw new Error("Falha na conversão");
  blob = outFmt === "jpg" ? await setJpegDpi(blob, DPI) : await setPngDpi(blob, DPI);
  return {blob, tw, th};
}

/* ---------------- UI ---------------- */
function render(){
  listEl.innerHTML = "";
  for (const it of items){
    const div = document.createElement("div");
    div.className = "item" + (it.status==="erro" ? " err" : "");
    const savePct = (it.origSize && it.newSize!=null)
      ? Math.round((1 - it.newSize/it.origSize) * 100) : null;
    div.innerHTML = `
      ${it.thumbUrl ? `<img class="thumb" src="${it.thumbUrl}" alt="">` : `<div class="thumb"></div>`}
      <div style="min-width:0">
        <div class="name">${it.outName ?? it.name}</div>
        <div class="meta">${fmtBytes(it.origSize)} → <b>${fmtBytes(it.newSize)}</b></div>
      </div>
      <div class="right">
        ${it.status==="pronto"
          ? `<span class="save${savePct<0?" grew":""}">${savePct>=0?"−":"+"}${Math.abs(savePct)}%</span>
             <a class="dl" href="${it.url}" download="${it.outName}" aria-label="Descarregar ${it.outName}">${dlIcon}</a>`
          : `<span class="status">${it.status}…</span>`}
      </div>`;
    listEl.appendChild(div);
  }
  const done = items.filter(i=>i.status==="pronto");
  const pending = items.filter(i=>i.status==="na fila" || i.status==="a processar").length;
  const o = done.reduce((a,i)=>a+i.origSize,0);
  const n = done.reduce((a,i)=>a+i.newSize,0);
  if (!items.length){
    sTitle.textContent = "Sem imagens";
    sDetail.textContent = "Adiciona fotografias para começar";
  } else if (pending){
    sTitle.textContent = `A preparar ${pending} ${pending===1?"imagem":"imagens"}…`;
    sDetail.textContent = done.length ? `${done.length} prontas` : " ";
  } else {
    sTitle.textContent = `${done.length} ${done.length===1?"imagem pronta":"imagens prontas"}`;
    sDetail.textContent = o ? `${fmtBytes(o)} → ${fmtBytes(n)} · poupaste ` : "";
    if (o){
      const b = document.createElement("b");
      b.textContent = Math.round((1-n/o)*100) + "%";
      sDetail.appendChild(b);
    }
  }
  zipBtn.disabled = done.length === 0;
}

/* ---------------- fila ---------------- */
let busy = false;
function addFiles(fileList){
  const accepted = [...fileList].filter(f => /image\/(jpeg|png|webp)/.test(f.type));
  for (const f of accepted){
    items.push({id:++seq, file:f, name:f.name, origSize:f.size, newSize:null,
                blob:null, url:null, thumbUrl:URL.createObjectURL(f),
                status:"na fila", outName:null});
  }
  render();
  if (!busy) runQueue();
}
async function runQueue(){
  busy = true;
  for (const it of items){
    if (it.status !== "na fila") continue;
    it.status = "a processar"; render();
    try {
      const {blob, tw, th} = await processFile(it.file);
      it.blob = blob;
      it.newSize = blob.size;
      if (it.url) URL.revokeObjectURL(it.url);
      it.url = URL.createObjectURL(blob);
      it.outName = `${baseName(it.name)}.${outFmt}`;
      it.status = "pronto";
    } catch(e){
      console.error(e);
      it.status = "erro";
    }
    render();
  }
  busy = false;
  render();
}

/* ---------------- ZIP ---------------- */
zipBtn.addEventListener("click", async () => {
  const done = items.filter(i=>i.status==="pronto");
  if (!done.length) return;
  if (done.length === 1){
    const a = document.createElement("a");
    a.href = done[0].url; a.download = done[0].outName; a.click();
    return;
  }
  zipBtn.disabled = true;
  const old = zipBtn.textContent;
  zipBtn.textContent = "A preparar…";
  try {
    const zip = new JSZip();
    const used = new Set();
    for (const it of done){
      let n = it.outName, k = 1;
      while (used.has(n)) n = `${baseName(it.outName)}_${k++}.${outFmt}`;
      used.add(n);
      zip.file(n, it.blob);
    }
    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `cdpfotos_${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  } finally {
    zipBtn.textContent = old;
    zipBtn.disabled = false;
  }
});

/* ---------------- limpar ---------------- */
clearBtn.addEventListener("click", () => {
  for (const it of items){
    if (it.url) URL.revokeObjectURL(it.url);
    if (it.thumbUrl) URL.revokeObjectURL(it.thumbUrl);
  }
  items = [];
  render();
});

/* ---------------- formato ---------------- */
function setFmt(f){
  if (f === outFmt) return;
  outFmt = f;
  fmtJpg.classList.toggle("on", f==="jpg");
  fmtPng.classList.toggle("on", f==="png");
  for (const it of items) if (it.status==="pronto" || it.status==="erro") it.status = "na fila";
  if (items.length && !busy) runQueue();
}
fmtJpg.addEventListener("click", ()=>setFmt("jpg"));
fmtPng.addEventListener("click", ()=>setFmt("png"));

/* ---------------- drag & drop ---------------- */
drop.addEventListener("click", ()=>fileInput.click());
drop.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();fileInput.click();} });
fileInput.addEventListener("change", ()=>{ addFiles(fileInput.files); fileInput.value=""; });
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e=>{e.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e=>{e.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop", e => addFiles(e.dataTransfer.files));
window.addEventListener("dragover", e=>e.preventDefault());
window.addEventListener("drop", e=>e.preventDefault());

render();
})();
</script>
</body>
</html>
